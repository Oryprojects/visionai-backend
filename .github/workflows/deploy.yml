name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t backend:latest .

      - name: Restart Backend Deployment
        run: |
          kubectl rollout restart deployment backend-deployment