name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t oryprojectsdocker/visionai-backend:latest .

      - name: Push Docker image
        run: docker push oryprojectsdocker/visionai-backend:latest

      - name: Restart Backend Deployment
        run: kubectl rollout restart deployment visionai-backend